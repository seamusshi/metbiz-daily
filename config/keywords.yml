# MetBiz Daily Report 配置文件
# 气象行业情报日报 - 关键词与数据源配置

categories:
  tender:
    name: "招标信息"
    description: "气象局招投标、中标公告"
    keywords:
      - "气象局 招标"
      - "气象局 中标"
      - "智慧气象 招标"
      - "气象信息化 项目"
      - "气象大数据 招标"
      - "气象观测站 招标"
      - "人工影响天气 招标"
    sources:
      - name: "中国政府采购网"
        url: "https://www.ccgp.gov.cn"
      - name: "中国气象局政府采购网"
        url: "https://cmagp.cmaidp.cma.cn"
      - name: "深圳政府采购"
        url: "http://zfcg.szggzy.com"
      - name: "郑州公共资源交易中心"
        url: "http://zzggzy.zhengzhou.gov.cn"
    provinces:
      - "广东"
      - "江苏"
      - "浙江"
      - "山东"
      - "北京"
      - "上海"
      - "四川"
      - "河南"
      - "河北"
      - "福建"
    priority: "high"

  policy:
    name: "政策动态"
    description: "中国气象局及各省政策文件、规划通知"
    keywords:
      - "中国气象局 政策"
      - "中国气象局 通知"
      - "气象高质量发展"
      - "气象信息化 政策"
      - "气象观测 规划"
      - "气象服务 意见"
    sources:
      - name: "中国气象局官网"
        url: "https://www.cma.gov.cn"
      - name: "国家气象信息中心"
        url: "https://www.nmic.cn"
    priority: "medium"

  competitor:
    name: "竞品动态"
    description: "主要竞争对手中标、产品动态"
    companies:
      - name: "航天宏图"
        keywords:
          - "航天宏图 气象"
          - "航天宏图 中标"
          - "航天宏图 卫星"
        priority: "high"
      - name: "华云气象"
        keywords:
          - "华云气象 中标"
          - "华云 气象项目"
          - "福建华云"
        priority: "high"
      - name: "墨迹天气"
        keywords:
          - "墨迹天气 企业"
          - "墨迹天气 气象服务"
        priority: "medium"
      - name: "国睿科技"
        keywords:
          - "国睿科技 气象雷达"
        priority: "medium"
    priority: "medium"

  technology:
    name: "技术趋势"
    description: "气象AI、大数据、新技术应用"
    keywords:
      - "气象 AI 人工智能"
      - "气象大模型"
      - "气象大数据"
      - "数值预报 AI"
      - "天气雷达 技术"
      - "气象卫星 应用"
    priority: "low"

# 报告设置
report:
  title: "MetBiz Daily Report | 气象行业情报日报"
  description: "每日自动收集气象行业招标、政策、竞品动态"
  timezone: "Asia/Shanghai"
  output_format: ["html", "json", "rss"]
  max_items_per_category: 10
  
# 紧急度规则
urgency_rules:
  urgent:
    - "截止.*今天|今日截止|今日开标"
    - "预算.*[5-9][0-9]{3,}万|预算.*[0-9]亿"
    - "5000万|1亿|2亿"
  high:
    - "截止.*明[天日]|后[天日]截止"
    - "预算.*[1-4][0-9]{3}万"
    - "智慧气象|大数据平台"
  medium:
    - "截止.*[3-7].*天"
    - "预算.*[5-9][0-9]{2}万"
  low:
    - ".*"
